      - generic [ref=e21]: O mně
      - heading "Přetvářím nápady v elegantní řešení" [level=2] [ref=e22]
      - paragraph [ref=e23]: Jsem Pavel Fuxa, web developer na volné noze. Spojuji programování s grafickým cítěním, takže weby nejen naprogramuji, ale taky navrhnu tak, aby dávaly smysl a dobře vypadaly.
      - paragraph [ref=e24]: K webům jsem se dostal přirozeně. Vystudoval jsem grafiku a postupně mě začalo lákat nejen weby navrhovat, ale rovnou je i stavět, a dělat to po svém, na sebe. Spojení designu a kódu mi dává smysl. Nejsem grafik, co předá návrh a dál ho neřeší, ani kodér, kterému je vzhled jedno.
      - paragraph [ref=e25]: Co ode mě můžete čekat? Přehlednou komunikaci a web postavený na míru místo přetažené šablony. Důraz kladu na to, aby byl výsledek rychlý, funkční a dobře použitelný. Po předání nezmizím. Web je pro mě začátek spolupráce, ne konec.
